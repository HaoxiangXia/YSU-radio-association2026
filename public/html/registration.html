<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>招新报名 - 无线电爱好者协会</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="/html/styles.css">
</head>
<body class="site-page sub-page recruit-page">
  <div id="nav-placeholder"></div>

  <header class="subpage-hero subpage-hero--compact">
    <div class="container subpage-hero__inner">
      <span class="subpage-hero__eyebrow">JOIN THE ASSOCIATION</span>
      <h1>报名信息</h1>
      <p>填写报名信息，加入协会的技术实践与校园协作。</p>
    </div>
  </header>

  <main class="page-container page-container--narrow subpage-content recruit-content">
    <div class="card card-section notice-card mb-6 recruit-notice">
      <h3 class="font-bold mb-2 text-gray-800">报名须知</h3>
      <p class="text-gray-500 text-sm">请填写以下信息完成报名，我们会尽快与您联系确认相关事宜</p>
      <p class="text-gray-500 text-sm">标有 <span class="text-red-500">*</span> 的为必填项</p>
    </div>

    <form id="registration-form" class="card form-card space-y-4 recruit-form">
      <div class="recruit-form__heading">
        <span>APPLICATION FORM</span>
        <h2>填写报名资料</h2>
        <p>请确保联系方式准确，提交前可再次检查填写内容。</p>
      </div>
      <div>
        <label for="registration-name" class="form-label">姓名 <span class="text-red-500">*</span></label>
        <input type="text" id="registration-name" name="name" class="form-input" placeholder="请输入姓名" aria-describedby="error-name" required>
        <div class="form-error" id="error-name"></div>
      </div>

      <div>
        <label for="registration-student-id" class="form-label">学号 <span class="text-red-500">*</span></label>
        <input type="text" id="registration-student-id" name="studentId" class="form-input" placeholder="请输入学号" aria-describedby="error-studentId" required>
        <div class="form-error" id="error-studentId"></div>
      </div>

      <div>
        <label for="registration-college" class="form-label">学院 <span class="text-red-500">*</span></label>
        <select id="registration-college" name="college" class="form-input" aria-describedby="error-college" required>
          <option value="">请选择学院</option>
        </select>
        <div class="form-error" id="error-college"></div>
      </div>

      <div>
        <label for="registration-grade" class="form-label">年级 <span class="text-red-500">*</span></label>
        <select id="registration-grade" name="grade" class="form-input" aria-describedby="error-grade" required>
          <option value="">请选择年级</option>
        </select>
        <div class="form-error" id="error-grade"></div>
      </div>

      <div>
        <label for="registration-phone" class="form-label">手机号码 <span class="text-red-500">*</span></label>
        <input type="tel" id="registration-phone" name="phone" class="form-input" placeholder="请输入手机号码" aria-describedby="error-phone" required>
        <div class="form-error" id="error-phone"></div>
      </div>

      <div>
        <label for="registration-email" class="form-label">电子邮箱 <span class="text-red-500">*</span></label>
        <input type="email" id="registration-email" name="email" class="form-input" placeholder="请输入电子邮箱" aria-describedby="error-email" required>
        <div class="form-error" id="error-email"></div>
      </div>

      <div>
        <label for="registration-experience" class="form-label">自我介绍 <span class="text-red-500">*</span></label>
        <textarea id="registration-experience" name="experience" class="form-input" rows="4" placeholder="请简单介绍自己，包括技术背景、兴趣爱好等（至少10个字符）" aria-describedby="error-experience" required></textarea>
        <div class="form-error" id="error-experience"></div>
      </div>

      <div>
        <label for="registration-expectation" class="form-label">加入期望</label>
        <textarea id="registration-expectation" name="expectation" class="form-input" rows="4" placeholder="请描述你加入协会的期望和目标"></textarea>
      </div>

      <div class="pt-4">
        <button type="submit" class="btn-solid w-full" id="submit-btn">提交报名</button>
      </div>
    </form>

    <!-- 成功提示 -->
    <div id="success-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="success-title">
      <div class="modal">
        <div class="text-4xl mb-4">🎉</div>
        <h3 id="success-title">报名成功！</h3>
        <p>感谢你的报名，我们会尽快与你联系确认相关事宜。</p>
        <button type="button" class="btn-solid" onclick="closeSuccessModal()">确定</button>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <button class="scrollTopBtn" title="回到顶部">↑</button>

  <div class="image-viewer">
    <img src="" alt="查看图片">
  </div>

  <script src="/html/data.js"></script>
  <script src="/html/common.js"></script>
  <script>
    // 初始化表单选项
    function initFormOptions() {
      const collegeSelect = document.querySelector('select[name="college"]');
      const gradeSelect = document.querySelector('select[name="grade"]');
      
      if (collegeSelect) {
        colleges.forEach(college => {
          const option = document.createElement('option');
          option.value = college;
          option.textContent = college;
          collegeSelect.appendChild(option);
        });
      }
      
      if (gradeSelect) {
        grades.forEach(grade => {
          const option = document.createElement('option');
          option.value = grade;
          option.textContent = grade;
          gradeSelect.appendChild(option);
        });
      }
    }

    // 表单验证
    function validateForm() {
      const form = document.getElementById('registration-form');
      const errors = {};
      
      // 清除所有错误
      document.querySelectorAll('.form-error').forEach(el => el.textContent = '');
      
      // 验证姓名
      const name = form.elements.name.value.trim();
      if (!name) errors.name = '请输入姓名';
      
      // 验证学号
      const studentId = form.elements.studentId.value.trim();
      if (!studentId) errors.studentId = '请输入学号';
      
      // 验证学院
      const college = form.elements.college.value;
      if (!college) errors.college = '请选择学院';
      
      // 验证年级
      const grade = form.elements.grade.value;
      if (!grade) errors.grade = '请选择年级';
      
      // 验证手机号
      const phone = form.elements.phone.value.trim();
      if (!/^1[3-9]\d{9}$/.test(phone)) errors.phone = '请输入有效的手机号码';
      
      // 验证邮箱
      const email = form.elements.email.value.trim();
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) errors.email = '请输入有效的电子邮箱';
      
      // 验证自我介绍
      const experience = form.elements.experience.value.trim();
      if (!experience || experience.length < 10) errors.experience = '自我介绍至少10个字符';
      
      // 显示错误
      Object.keys(errors).forEach(key => {
        const errorEl = document.getElementById(`error-${key}`);
        if (errorEl) errorEl.textContent = errors[key];
      });
      
      return Object.keys(errors).length === 0;
    }

    // 提交表单
    async function handleSubmit(e) {
      e.preventDefault();
      
      if (!validateForm()) return;
      
      const form = document.getElementById('registration-form');
      const submitBtn = document.getElementById('submit-btn');
      
      // 禁用提交按钮
      submitBtn.disabled = true;
      submitBtn.textContent = '提交中...';
      
      try {
        const formData = {
          name: form.elements.name.value.trim(),
          studentId: form.elements.studentId.value.trim(),
          college: form.elements.college.value,
          grade: form.elements.grade.value,
          phone: form.elements.phone.value.trim(),
          email: form.elements.email.value.trim(),
          experience: form.elements.experience.value.trim(),
          expectation: form.elements.expectation.value.trim(),
        };
        
        const response = await fetch('/api/registration', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(formData),
        });
        
        if (response.ok) {
          // 显示成功提示
          document.getElementById('success-modal').classList.add('open');
          // 重置表单
          form.reset();
        } else {
          alert('提交失败，请稍后再试');
        }
      } catch (error) {
        alert('提交失败，请稍后再试');
      } finally {
        // 恢复提交按钮
        submitBtn.disabled = false;
        submitBtn.textContent = '提交报名';
      }
    }

    // 关闭成功提示
    function closeSuccessModal() {
      document.getElementById('success-modal').classList.remove('open');
    }

    // 页面加载后初始化
    document.addEventListener('DOMContentLoaded', () => {
      initFormOptions();
      
      const form = document.getElementById('registration-form');
      if (form) {
        form.addEventListener('submit', handleSubmit);
      }
    });
  </script>
</body>
</html>
