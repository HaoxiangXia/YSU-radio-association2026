<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>入会申请 - 无线电爱好者协会</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="/html/styles.css">
  <style>
.pt-4 {
  padding-top: 1rem;
}

.text-4xl {
  font-size: 2.25rem;
}

.notice-card {
  border-top: 3px solid var(--color-primary);
  background: linear-gradient(135deg, rgba(239, 246, 255, 0.72), #ffffff 62%);
}

.form-error {
  color: #dc2626;
  font-size: 0.75rem;
  margin-top: 0.25rem;
}

.site-page .notice-card {
  border-top-color: transparent;
  background:
    linear-gradient(#ffffff, #ffffff) padding-box,
    linear-gradient(90deg, var(--site-blue), var(--site-cyan), var(--site-violet)) border-box;
  border-top-width: 3px;
}

.site-page .form-error {
  min-height: 0.5rem;
  color: #b91c1c;
  font-weight: 500;
}

/* 入会申请和查询：仅增强展示层，不改变控件和业务行为 */
.site-page.membership-application-page .membership-application-notice {
  position: relative;
  padding-left: clamp(1.35rem, 3vw, 2.25rem);
}

.site-page.membership-application-page .membership-application-notice::before {
  content: '01';
  position: absolute;
  top: 1.35rem;
  right: 1.5rem;
  color: rgba(37, 99, 235, 0.14);
  font-size: 2.25rem;
  font-weight: 750;
}

.site-page.membership-application-page .membership-application-form {
  border-color: rgba(59, 130, 246, 0.2);
  background:
    radial-gradient(circle at 100% 0%, rgba(96, 165, 250, 0.1), transparent 18rem),
    #ffffff;
}

.site-page.membership-application-page .membership-application-form__heading {
  margin-bottom: 1.5rem;
  padding-bottom: 1.25rem;
  border-bottom: 1px solid rgba(148, 163, 184, 0.18);
}

.site-page.membership-application-page .membership-application-form__heading h2 {
  margin-bottom: 0.4rem;
  color: var(--site-ink);
  font-size: clamp(1.3rem, 2.5vw, 1.65rem);
}

.site-page.membership-application-page .membership-application-form__heading p {
  color: var(--site-muted);
  font-size: 0.82rem;
  line-height: 1.65;
}

.site-page.membership-application-page .membership-application-form > div:not(.membership-application-form__heading) {
  padding-bottom: 0.2rem;
}
  </style>
</head>
<body class="site-page sub-page membership-application-page">
  <div id="nav-placeholder"></div>

  <header class="subpage-hero subpage-hero--compact">
    <div class="container subpage-hero__inner">
      <h1>入会申请</h1>
      <p>填写入会申请资料，加入协会的技术实践与校园协作。</p>
    </div>
  </header>

  <main class="page-container page-container--narrow subpage-content membership-application-content">
    <div class="card card-section notice-card mb-6 membership-application-notice">
      <h3 class="font-bold mb-2 text-gray-800">入会申请须知</h3>
      <p class="text-gray-500 text-sm">请填写以下信息完成入会申请，我们会尽快与您联系确认相关事宜</p>
      <p class="text-gray-500 text-sm">标有 <span class="text-red-500">*</span> 的为必填项</p>
    </div>

    <form id="membership-application-form" class="card form-card space-y-4 membership-application-form">
      <div class="membership-application-form__heading">
        <span>APPLICATION FORM</span>
        <h2>填写入会申请资料</h2>
        <p>请确保联系方式准确，提交前可再次检查填写内容。</p>
      </div>
      <div>
        <label for="membership-application-name" class="form-label">姓名 <span class="text-red-500">*</span></label>
        <input type="text" id="membership-application-name" name="name" class="form-input" placeholder="请输入姓名" aria-describedby="error-name" required>
        <div class="form-error" id="error-name"></div>
      </div>

      <div>
        <label for="membership-application-student-id" class="form-label">学号 <span class="text-red-500">*</span></label>
        <input type="text" id="membership-application-student-id" name="studentId" class="form-input" placeholder="请输入学号" aria-describedby="error-studentId" required>
        <div class="form-error" id="error-studentId"></div>
      </div>

      <div>
        <label for="membership-application-college" class="form-label">学院 <span class="text-red-500">*</span></label>
        <select id="membership-application-college" name="college" class="form-input" aria-describedby="error-college" required>
          <option value="">请选择学院</option>
        </select>
        <div class="form-error" id="error-college"></div>
      </div>

      <div>
        <label for="membership-application-grade" class="form-label">年级 <span class="text-red-500">*</span></label>
        <select id="membership-application-grade" name="grade" class="form-input" aria-describedby="error-grade" required>
          <option value="">请选择年级</option>
        </select>
        <div class="form-error" id="error-grade"></div>
      </div>

      <div>
        <label for="membership-application-phone" class="form-label">手机号码 <span class="text-red-500">*</span></label>
        <input type="tel" id="membership-application-phone" name="phone" class="form-input" placeholder="请输入手机号码" aria-describedby="error-phone" required>
        <p class="text-gray-500 text-xs mt-1">请确保手机号准确，录取查询时需使用此手机号进行核验</p>
        <div class="form-error" id="error-phone"></div>
      </div>

      <div>
        <label for="membership-application-email" class="form-label">电子邮箱 <span class="text-red-500">*</span></label>
        <input type="email" id="membership-application-email" name="email" class="form-input" placeholder="请输入电子邮箱" aria-describedby="error-email" required>
        <div class="form-error" id="error-email"></div>
      </div>

      <div>
        <label for="membership-application-self-introduction" class="form-label">自我介绍 <span class="text-red-500">*</span></label>
        <textarea id="membership-application-self-introduction" name="self_introduction" class="form-input" rows="4" placeholder="请简单介绍自己，包括技术背景、兴趣爱好等（至少10个字符）" aria-describedby="error-self_introduction" required></textarea>
        <div class="form-error" id="error-self_introduction"></div>
      </div>

      <div>
        <label for="membership-application-expectation" class="form-label">加入期望</label>
        <textarea id="membership-application-expectation" name="expectation" class="form-input" rows="4" placeholder="请描述你加入协会的期望和目标"></textarea>
      </div>

      <div class="pt-4">
        <button type="submit" class="btn-solid w-full" id="submit-btn">提交入会申请</button>
      </div>
    </form>

    <!-- 成功提示 -->
    <div id="success-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="success-title">
      <div class="modal">
        <div class="text-4xl mb-4">🎉</div>
        <h3 id="success-title">入会申请提交成功！</h3>
        <p>感谢你的入会申请，我们会尽快与你联系确认相关事宜。</p>
        <button type="button" class="btn-solid" onclick="closeSuccessModal()">确定</button>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <button class="scrollTopBtn" title="回到顶部">↑</button>

  <div class="image-viewer">
    <img src="" alt="查看图片">
  </div>

  <script src="/html/data.js"></script>
  <script src="/html/common.js"></script>
  <script>
    // 初始化表单选项
    function initFormOptions() {
      const collegeSelect = document.querySelector('select[name="college"]');
      const gradeSelect = document.querySelector('select[name="grade"]');
      
      if (collegeSelect) {
        colleges.forEach(college => {
          const option = document.createElement('option');
          option.value = college;
          option.textContent = college;
          collegeSelect.appendChild(option);
        });
      }
      
      if (gradeSelect) {
        grades.forEach(grade => {
          const option = document.createElement('option');
          option.value = grade;
          option.textContent = grade;
          gradeSelect.appendChild(option);
        });
      }
    }

    // 表单验证
    function validateForm() {
      const form = document.getElementById('membership-application-form');
      const errors = {};
      
      // 清除所有错误
      document.querySelectorAll('.form-error').forEach(el => el.textContent = '');
      
      // 验证姓名
      const name = form.elements.name.value.trim();
      if (!name) errors.name = '请输入姓名';
      
      // 验证学号
      const studentId = form.elements.studentId.value.trim();
      if (!studentId) errors.studentId = '请输入学号';
      
      // 验证学院
      const college = form.elements.college.value;
      if (!college) errors.college = '请选择学院';
      
      // 验证年级
      const grade = form.elements.grade.value;
      if (!grade) errors.grade = '请选择年级';
      
      // 验证手机号
      const phone = form.elements.phone.value.trim();
      if (!/^1[3-9]\d{9}$/.test(phone)) errors.phone = '请输入有效的手机号码';
      
      // 验证邮箱
      const email = form.elements.email.value.trim();
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) errors.email = '请输入有效的电子邮箱';
      
      // 验证自我介绍
      const self_introduction = form.elements.self_introduction.value.trim();
      if (!self_introduction || self_introduction.length < 10) errors.self_introduction = '自我介绍至少10个字符';
      
      // 显示错误
      Object.keys(errors).forEach(key => {
        const errorEl = document.getElementById(`error-${key}`);
        if (errorEl) errorEl.textContent = errors[key];
      });
      
      return Object.keys(errors).length === 0;
    }

    // 提交表单
    async function handleSubmit(e) {
      e.preventDefault();
      
      if (!validateForm()) return;
      
      const form = document.getElementById('membership-application-form');
      const submitBtn = document.getElementById('submit-btn');
      
      // 禁用提交按钮
      submitBtn.disabled = true;
      submitBtn.textContent = '提交中...';
      
      try {
        const formData = {
          name: form.elements.name.value.trim(),
          studentId: form.elements.studentId.value.trim(),
          college: form.elements.college.value,
          grade: form.elements.grade.value,
          phone: form.elements.phone.value.trim(),
          email: form.elements.email.value.trim(),
          self_introduction: form.elements.self_introduction.value.trim(),
          expectation: form.elements.expectation.value.trim(),
        };
        
        const response = await fetch('/api/membership-applications', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(formData),
        });
        
        if (response.ok) {
          // 显示成功提示
          document.getElementById('success-modal').classList.add('open');
          // 重置表单
          form.reset();
        } else {
          alert('提交失败，请稍后再试');
        }
      } catch (error) {
        alert('提交失败，请稍后再试');
      } finally {
        // 恢复提交按钮
        submitBtn.disabled = false;
        submitBtn.textContent = '提交入会申请';
      }
    }

    // 关闭成功提示
    function closeSuccessModal() {
      document.getElementById('success-modal').classList.remove('open');
    }

    // 页面加载后初始化
    document.addEventListener('DOMContentLoaded', () => {
      initFormOptions();
      
      const form = document.getElementById('membership-application-form');
      if (form) {
        form.addEventListener('submit', handleSubmit);
      }
    });
  </script>
</body>
</html>
