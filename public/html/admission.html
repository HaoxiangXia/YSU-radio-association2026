<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>录取查询 - 无线电爱好者协会</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="/html/styles.css">
  <style>
.mb-3 {
  margin-bottom: 0.75rem;
}

.mt-4 {
  margin-top: 1rem;
}

.p-4 {
  padding: 1rem;
}

.text-3xl {
  font-size: 1.875rem;
}

.text-blue-400 {
  color: #60a5fa;
}

.text-red-600 {
  color: #dc2626;
}

.bg-gray-50 {
  background-color: #f9fafb;
}

.bg-red-50 {
  background-color: #fef2f2;
}

.border-gray-200 {
  border-color: #e5e7eb;
}

.border-red-200 {
  border-color: #fecaca;
}

.query-form {
  display: flex;
  align-items: stretch;
  gap: 1rem;
}

.query-form .form-input {
  min-width: 0;
  flex: 1;
}

@media (max-width: 540px) {
  .query-form {
    flex-direction: column;
  }

  .query-form .btn-solid {
    width: 100%;
  }
}

.site-page .query-form {
  padding: 0.3rem;
  border-radius: 11px;
}

.site-page #query-result > div {
  border-radius: 11px;
  box-shadow: 0 12px 32px rgba(15, 23, 42, 0.07);
}

.site-page.query-page .query-card {
  position: relative;
  overflow: hidden;
  border-top: 3px solid #2563eb;
  background:
    radial-gradient(circle at 94% 12%, rgba(96, 165, 250, 0.14), transparent 16rem),
    #ffffff;
}

.site-page.query-page .query-card .card-title {
  font-size: clamp(1.35rem, 2.5vw, 1.75rem);
}

.site-page.query-page .query-form {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 0.75rem;
  margin-top: 1.25rem;
  padding: 0.8rem;
  border: 1px solid rgba(59, 130, 246, 0.13);
  background: rgba(239, 246, 255, 0.66);
}

.site-page.query-page .query-guide {
  border-color: rgba(148, 163, 184, 0.18);
  background: rgba(255, 255, 255, 0.82);
  box-shadow: 0 12px 34px rgba(15, 23, 42, 0.055);
}

.site-page.query-page .query-guide li > span {
  color: #2563eb;
}
  </style>
</head>
<body class="site-page sub-page query-page">
  <div id="nav-placeholder"></div>

  <header class="subpage-hero subpage-hero--compact">
    <div class="container subpage-hero__inner">
      <h1>录取查询</h1>
      <p>输入学号和手机号查询录取结果，查询结果以协会正式通知为准。</p>
    </div>
  </header>

  <main class="page-container page-container--narrow subpage-content query-content">
    <section class="card card-section mb-6 query-card">
      <span class="query-card__eyebrow">RESULT LOOKUP</span>
      <h2 class="card-title">查询录取结果</h2>
      <p class="text-gray-600 text-sm mb-4">请输入你的学号和入会申请时填写的手机号查询录取结果</p>
      
      <div class="query-form">
        <input type="text" id="student-id-input" class="form-input" placeholder="请输入12位学号" aria-label="学号" maxlength="12">
        <input type="tel" id="phone-input" class="form-input" placeholder="请输入手机号" aria-label="手机号" maxlength="11">
        <button type="button" class="btn-solid" onclick="checkAdmission()">查询</button>
      </div>
      
      <div id="query-result" class="mt-4" style="display: none;">
        <!-- 查询结果由 JavaScript 动态生成 -->
      </div>
    </section>

    <aside class="card card-section query-guide">
      <h3 class="font-bold text-gray-800 mb-3">查询说明</h3>
      <ul class="space-y-2 text-sm text-gray-600">
        <li class="flex items-start gap-2">
          <span class="text-blue-400 mt-1">-</span>
          请输入完整的12位学号和入会申请时填写的手机号
        </li>
        <li class="flex items-start gap-2">
          <span class="text-blue-400 mt-1">-</span>
          查询结果仅供参考，最终录取结果以协会通知为准
        </li>
        <li class="flex items-start gap-2">
          <span class="text-blue-400 mt-1">-</span>
          如有疑问，请联系协会负责人
        </li>
      </ul>
    </aside>
  </main>

  <div id="footer-placeholder"></div>

  <button class="scrollTopBtn" title="回到顶部">↑</button>

  <div class="image-viewer">
    <img src="" alt="查看图片">
  </div>

  <script src="/html/data.js"></script>
  <script src="/html/common.js"></script>
  <script>
    // 录取数据（模拟）
    const admissions = new Map();
    
    // 加载录取数据
    async function loadAdmissions() {
      try {
        const response = await fetch('/data/admission-results.json');
        if (response.ok) {
          const data = await response.json();
          data.forEach(item => {
            admissions.set(item.studentId, item);
          });
        }
      } catch (error) {
        console.log('加载录取数据失败，使用模拟数据');
        // 模拟数据
        admissions.set('202400010001', { name: '张三', phone: '13800138000', department: '嵌入式部', status: '已录取' });
        admissions.set('202400010002', { name: '李四', phone: '13800138001', department: '计算机部', status: '已录取' });
        admissions.set('202400010003', { name: '王五', phone: '13800138002', department: '机械部', status: '未录取' });
      }
    }

    // 查询录取结果
    function checkAdmission() {
      const studentIdInput = document.getElementById('student-id-input');
      const phoneInput = document.getElementById('phone-input');
      const resultDiv = document.getElementById('query-result');
      const studentId = studentIdInput.value.trim();
      const phone = phoneInput.value.trim();
      
      // 验证学号格式
      if (!/^\d{12}$/.test(studentId)) {
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = `
          <div class="bg-red-50 border border-red-200 rounded-lg p-4">
            <p class="text-red-600 font-medium">请输入正确的12位学号</p>
          </div>
        `;
        return;
      }
      
      // 验证手机号格式
      if (!/^1[3-9]\d{9}$/.test(phone)) {
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = `
          <div class="bg-red-50 border border-red-200 rounded-lg p-4">
            <p class="text-red-600 font-medium">请输入正确的11位手机号</p>
          </div>
        `;
        return;
      }
      
      // 查询结果：必须同时匹配学号和手机号
      const admission = admissions.get(studentId);
      
      resultDiv.style.display = 'block';
      
      if (admission && admission.phone === phone) {
        const statusColor = admission.status === '已录取' ? 'text-green-600' : 'text-yellow-600';
        const statusBg = admission.status === '已录取' ? 'bg-green-50 border-green-200' : 'bg-yellow-50 border-yellow-200';
        
        resultDiv.innerHTML = `
          <div class="${statusBg} border rounded-lg p-4">
            <div class="text-center">
              <div class="text-3xl mb-2">${admission.status === '已录取' ? '🎉' : '⏳'}</div>
              <h3 class="font-bold text-gray-800 mb-2">${admission.name}同学</h3>
              <p class="${statusColor} font-medium mb-2">${admission.status}</p>
              ${admission.department ? `<p class="text-gray-600 text-sm">录取部门：${admission.department}</p>` : ''}
            </div>
          </div>
        `;
      } else {
        resultDiv.innerHTML = `
          <div class="bg-gray-50 border border-gray-200 rounded-lg p-4">
            <div class="text-center">
              <div class="text-3xl mb-2">😢</div>
              <h3 class="font-bold text-gray-800 mb-2">未找到录取结果</h3>
              <p class="text-gray-600 text-sm">请检查学号和手机号是否正确，或联系协会负责人确认</p>
            </div>
          </div>
        `;
      }
    }

    // 页面加载后初始化
    document.addEventListener('DOMContentLoaded', () => {
      loadAdmissions();
      
      // 回车查询
      const studentIdInput = document.getElementById('student-id-input');
      const phoneInput = document.getElementById('phone-input');
      const triggerQuery = (e) => {
        if (e.key === 'Enter') {
          checkAdmission();
        }
      };
      if (studentIdInput) {
        studentIdInput.addEventListener('keypress', triggerQuery);
      }
      if (phoneInput) {
        phoneInput.addEventListener('keypress', triggerQuery);
      }
    });
  </script>
</body>
</html>
