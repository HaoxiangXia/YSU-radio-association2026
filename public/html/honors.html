<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>荣誉成就 - 无线电爱好者协会</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="/html/styles.css">
</head>
<body>
  <div id="nav-placeholder"></div>

  <main class="page-container">
    <h1 class="section-title">荣誉成就</h1>

    <!-- 荣誉卡片 -->
    <div id="honors-cards" class="grid md:grid-cols-3 gap-4 mb-6">
      <!-- 荣誉卡片由 JavaScript 动态生成 -->
    </div>

    <!-- 活力团支部榜单 -->
    <div class="card card-section mb-6">
      <h2 class="card-title">河北省高校活力团支部TOP10</h2>
      <div class="overflow-x-auto">
        <table class="data-table">
          <thead>
            <tr>
              <th class="text-center" style="width: 3rem;">排名</th>
              <th>学校</th>
              <th>团支部名称</th>
            </tr>
          </thead>
          <tbody id="league-table">
            <!-- 榜单内容由 JavaScript 动态生成 -->
          </tbody>
        </table>
      </div>
    </div>

    <!-- 竞赛列表 -->
    <div class="card card-section mb-6">
      <h2 class="card-title">参与竞赛</h2>
      <div class="flex flex-wrap gap-2" id="competition-tags">
        <!-- 竞赛标签由 JavaScript 动态生成 -->
      </div>
    </div>

    <!-- 成就统计 -->
    <div class="card card-section">
      <h2 class="card-title">成就统计</h2>
      <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
        <div class="stat-card">
          <div class="stat-value">150+</div>
          <div class="stat-label">获奖总数</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">30+</div>
          <div class="stat-label">国家级奖项</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">50+</div>
          <div class="stat-label">省级奖项</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">70+</div>
          <div class="stat-label">其他奖项</div>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <button class="scrollTopBtn" title="回到顶部">↑</button>

  <div class="image-viewer">
    <img src="" alt="查看图片">
  </div>

  <script src="/html/data.js"></script>
  <script src="/html/common.js"></script>
  <script>
    // 渲染荣誉卡片
    function renderHonorsCards() {
      const container = document.getElementById('honors-cards');
      if (!container) return;
      
      container.innerHTML = topHonors.map(honor => `
        <div class="card card-section">
          <div class="text-center">
            <div class="text-3xl mb-2">${honor.rank ? '🏅' : '🏆'}</div>
            <h3 class="font-bold text-gray-800 mb-2">${honor.title}</h3>
            <div class="text-sm text-gray-500 mb-2">${honor.year}</div>
            ${honor.rank ? `<span class="badge badge-red">TOP${honor.rank}</span>` : ''}
            <p class="text-gray-600 text-sm mt-3">${honor.description}</p>
          </div>
        </div>
      `).join('');
    }

    // 渲染活力团支部榜单
    function renderLeagueTable() {
      const tbody = document.getElementById('league-table');
      if (!tbody) return;
      
      tbody.innerHTML = leagueTop10.map(item => `
        <tr class="${item.highlight ? 'highlight-row' : ''}">
          <td class="text-center font-bold ${item.rank <= 3 ? 'text-blue-600' : 'text-gray-600'}">${item.rank}</td>
          <td class="text-gray-600">${item.school}</td>
          <td class="text-gray-600">${item.name}</td>
        </tr>
      `).join('');
    }

    // 渲染竞赛标签
    function renderCompetitionTags() {
      const container = document.getElementById('competition-tags');
      if (!container) return;
      
      container.innerHTML = competitionList.map(comp => `
        <span class="tag">${comp}</span>
      `).join('');
    }

    // 页面加载后渲染
    document.addEventListener('DOMContentLoaded', () => {
      renderHonorsCards();
      renderLeagueTable();
      renderCompetitionTags();
    });
  </script>
</body>
</html>
