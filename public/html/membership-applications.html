<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>入会申请管理 - 无线电爱好者协会</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="/html/styles.css">
  <style>
.btn-sm {
  padding: 0.5rem 0.75rem;
  font-size: 0.875rem;
}

.text-gray-700 {
  color: #374151;
}

.stat-card--accent {
  border-top: 3px solid var(--color-primary);
}

/* 搜索栏 */
.search-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 0.75rem;
  align-items: center;
  margin-bottom: 1.5rem;
}

.search-bar input,
.search-bar select {
  min-width: 140px;
  flex: 1;
  padding: 0.5rem 0.75rem;
  border: 1px solid var(--color-border);
  border-radius: 6px;
  font-size: 0.875rem;
  background: white;
  color: var(--color-text);
}

.search-bar input:focus,
.search-bar select:focus {
  outline: none;
  border-color: var(--color-primary);
  box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
}

/* 分页 */
.pagination {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
  margin-top: 1.5rem;
}

.pagination button {
  padding: 0.375rem 0.75rem;
  border: 1px solid var(--color-border);
  border-radius: 4px;
  background: white;
  color: var(--color-text);
  font-size: 0.875rem;
  cursor: pointer;
  transition: border-color 200ms ease, color 200ms ease, background-color 200ms ease, opacity 200ms ease;
}

.pagination button:hover {
  border-color: var(--color-primary);
  color: var(--color-primary);
}

.pagination button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.pagination button.active {
  background: var(--color-primary);
  border-color: var(--color-primary);
  color: white;
}

/* 管理页面复用样式 */
.action-btn {
  padding: 0.25rem 0.5rem;
  border: none;
  border-radius: 4px;
  font-size: 0.75rem;
  cursor: pointer;
  transition: background-color 200ms ease, color 200ms ease, opacity 200ms ease;
}

.action-btn.view {
  background: rgba(37, 99, 235, 0.1);
  color: var(--color-primary);
}

.action-btn.view:hover {
  background: rgba(37, 99, 235, 0.18);
}

.action-btn.delete {
  background: rgba(239, 68, 68, 0.1);
  color: #dc2626;
}

.action-btn.delete:hover {
  background: rgba(239, 68, 68, 0.18);
}

.action-group {
  display: flex;
  gap: 0.25rem;
}

.detail-label {
  margin-bottom: 0.125rem;
  color: #6b7280;
  font-size: 0.75rem;
}

.detail-value {
  margin-bottom: 0.75rem;
  padding: 0.5rem;
  border-radius: 4px;
  background: #f9fafb;
  color: #374151;
  font-size: 0.875rem;
}

.recruitment-officer-filter-card {
  padding: 1rem;
}

.recruitment-officer-table-card {
  overflow: hidden;
  padding: 0;
}

.recruitment-officer-table-card .pagination {
  margin-top: 0;
  padding: 1rem;
  border-top: 1px solid #f3f4f6;
}

.recruitment-officer-table-header,
.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1rem;
  border-bottom: 1px solid #f3f4f6;
}

.recruitment-officer-table-header {
  background: #f9fafb;
}

.modal--detail {
  display: flex;
  flex-direction: column;
  max-width: 32rem;
  max-height: 80vh;
  overflow: hidden;
  padding: 0;
  text-align: left;
}

.modal-body {
  min-height: 0;
  overflow-y: auto;
  padding: 1rem;
}

.icon-button {
  padding: 0.25rem;
  border: none;
  background: none;
  color: #6b7280;
  font-size: 1.25rem;
  cursor: pointer;
  transition: color 180ms ease;
}

.icon-button:hover {
  color: var(--color-text);
}

.site-page .stat-card--accent {
  border-top-color: var(--site-blue);
}

/* 管理页只做展示层统一 */
.site-page.recruitment-officer-page .recruitment-officer-filter-card,
.site-page.recruitment-officer-page .recruitment-officer-table-card {
  border-color: rgba(148, 163, 184, 0.22);
}

.site-page.recruitment-officer-page .recruitment-officer-table-header {
  background: linear-gradient(180deg, #f1f5f9, #f8fafc);
}

.site-page.recruitment-officer-page .action-btn {
  min-height: 2rem;
  border: 1px solid rgba(148, 163, 184, 0.22);
  border-radius: 6px;
}

.admin-feedback {
  min-height: 1.5rem;
  margin-top: 0.75rem;
  color: #64748b;
  font-size: 0.875rem;
}

.admin-feedback.is-error { color: #dc2626; }

@media (max-width: 700px) {
  .registration-info-page .overflow-x-auto { overflow: visible; }
  .registration-info-page .data-table,
  .registration-info-page .data-table tbody,
  .registration-info-page .data-table tr,
  .registration-info-page .data-table td { display: block; width: 100%; }
  .registration-info-page .data-table { min-width: 0; }
  .registration-info-page .data-table thead { display: none; }
  .registration-info-page .data-table tr {
    padding: 0.85rem 1rem;
    border-bottom: 1px solid #e2e8f0;
  }
  .registration-info-page .data-table td {
    display: grid;
    grid-template-columns: 5.5rem minmax(0, 1fr);
    gap: 0.5rem;
    padding: 0.3rem 0;
    border: 0;
    overflow-wrap: anywhere;
  }
  .registration-info-page .data-table td::before {
    content: attr(data-label);
    color: #64748b;
    font-size: 0.75rem;
  }
  .registration-info-page .data-table td[data-label="操作"] { display: block; margin-top: 0.45rem; }
  .registration-info-page .data-table td[data-label="操作"]::before { display: none; }
}
  </style>
</head>
<body class="site-page sub-page recruitment-officer-page membership-applications-page">
  <div id="nav-placeholder"></div>

  <header class="subpage-hero subpage-hero--compact">
    <div class="container subpage-hero__inner">
      <h1>入会申请管理</h1>
      <p>查看、筛选与管理当前入会申请。</p>
    </div>
  </header>

  <main class="page-container subpage-content">
    <!-- 统计卡片 -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
      <div class="stat-card stat-card--accent">
        <div class="stat-value" id="stat-total">-</div>
        <div class="stat-label">总申请</div>
      </div>
      <div class="stat-card stat-card--accent">
        <div class="stat-value" id="stat-today">-</div>
        <div class="stat-label">今日新增</div>
      </div>
      <div class="stat-card stat-card--accent">
        <div class="stat-value" id="stat-colleges">-</div>
        <div class="stat-label">涉及学院</div>
      </div>
      <div class="stat-card stat-card--accent">
        <div class="stat-value" id="stat-grades">-</div>
        <div class="stat-label">涉及年级</div>
      </div>
    </div>

    <!-- 搜索栏 -->
    <div class="card card-section recruitment-officer-filter-card mb-6">
      <div class="search-bar">
        <input type="text" id="search-input" placeholder="搜索姓名、学号、学院..." aria-label="搜索入会申请">
        <select id="college-filter" aria-label="按学院筛选">
          <option value="">所有学院</option>
        </select>
        <select id="grade-filter" aria-label="按年级筛选">
          <option value="">所有年级</option>
        </select>
        <button type="button" class="btn-solid btn-sm" id="refresh-button">刷新</button>
        <button type="button" class="btn-solid btn-sm" id="export-button">导出 CSV</button>
        <button type="button" class="btn-outline btn-sm" id="logout-button">退出登录</button>
      </div>
      <p id="admin-feedback" class="admin-feedback" role="status"></p>
    </div>

    <!-- 数据表格 -->
    <div class="card card-section recruitment-officer-table-card">
      <div class="recruitment-officer-table-header">
        <span class="font-semibold text-sm text-gray-700">入会申请列表</span>
        <span class="text-sm text-gray-400" id="total-count">共 0 条</span>
      </div>
      <div class="overflow-x-auto">
        <table class="data-table" id="data-table">
          <thead>
            <tr>
              <th>#</th>
              <th>姓名</th>
              <th>学号</th>
              <th>学院</th>
              <th>年级</th>
              <th>联系电话</th>
              <th>电子邮箱</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="data-body">
            <tr><td colspan="8" class="p-8 text-center text-gray-400">暂无数据</td></tr>
          </tbody>
        </table>
      </div>
      <div class="pagination" id="pagination"></div>
    </div>

    <!-- 详情弹窗 -->
    <div id="detail-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="detail-modal-title">
      <div class="modal modal--detail">
        <div class="modal-header">
          <h3 id="detail-modal-title" class="font-semibold text-blue-600">入会申请详情</h3>
          <button class="icon-button" id="detail-close-button" type="button" aria-label="关闭详情">&times;</button>
        </div>
        <div class="modal-body" id="detail-content">
          <!-- 详情内容由 JavaScript 动态生成 -->
        </div>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <button class="scrollTopBtn" title="回到顶部">↑</button>

  <div class="image-viewer">
    <img src="" alt="查看图片">
  </div>

  <script src="/html/data.js"></script>
  <script src="/html/common.js"></script>
  <script>
    const pageSize = 20;
    let currentPage = 1;
    let currentItems = [];
    let pagination = { current: 1, total: 0, count: 0 };
    let searchTimer;
    let latestLoadRequest = 0;

    function getToken() {
      return localStorage.getItem('recruitment_officer_token') || sessionStorage.getItem('recruitment_officer_token');
    }

    function getAuthHeaders() {
      return { Authorization: `Bearer ${getToken()}` };
    }

    function setFeedback(message = '', isError = false) {
      const feedback = document.getElementById('admin-feedback');
      feedback.textContent = message;
      feedback.classList.toggle('is-error', isError);
    }

    function createCell(value, label, className = '') {
      const cell = document.createElement('td');
      cell.dataset.label = label;
      cell.className = className;
      cell.textContent = value || '-';
      return cell;
    }

    function renderTable() {
      const body = document.getElementById('data-body');
      body.replaceChildren();
      document.getElementById('total-count').textContent = `共 ${pagination.count} 条`;
      if (!currentItems.length) {
        const row = document.createElement('tr');
        const cell = document.createElement('td');
        cell.colSpan = 8;
        cell.className = 'p-8 text-center text-gray-400';
        cell.textContent = '暂无符合条件的数据';
        row.appendChild(cell);
        body.appendChild(row);
        renderPagination();
        return;
      }

      currentItems.forEach((item, index) => {
        const row = document.createElement('tr');
        row.appendChild(createCell((currentPage - 1) * pageSize + index + 1, '编号', 'text-sm text-gray-400'));
        row.appendChild(createCell(item.name, '姓名', 'font-medium text-sm'));
        row.appendChild(createCell(item.studentId, '学号', 'text-sm text-gray-600'));
        row.appendChild(createCell(item.college, '学院', 'text-sm text-gray-600'));
        row.appendChild(createCell(item.grade, '年级', 'text-sm text-gray-600'));
        row.appendChild(createCell(item.phone, '联系电话', 'text-sm text-gray-600'));
        row.appendChild(createCell(item.email, '电子邮箱', 'text-sm text-gray-600'));

        const actionCell = document.createElement('td');
        actionCell.dataset.label = '操作';
        const actions = document.createElement('div');
        actions.className = 'action-group';
        const viewButton = document.createElement('button');
        viewButton.type = 'button';
        viewButton.className = 'action-btn view';
        viewButton.textContent = '详情';
        viewButton.addEventListener('click', () => viewDetail(item));
        const deleteButton = document.createElement('button');
        deleteButton.type = 'button';
        deleteButton.className = 'action-btn delete';
        deleteButton.textContent = '删除';
        deleteButton.addEventListener('click', () => deleteItem(item));
        actions.append(viewButton, deleteButton);
        actionCell.appendChild(actions);
        row.appendChild(actionCell);
        body.appendChild(row);
      });
      renderPagination();
    }

    function renderPagination() {
      const container = document.getElementById('pagination');
      container.replaceChildren();
      if (pagination.total <= 1) return;
      const addButton = (label, page, disabled, active = false) => {
        const button = document.createElement('button');
        button.type = 'button';
        button.textContent = label;
        button.disabled = disabled;
        button.classList.toggle('active', active);
        button.addEventListener('click', () => loadData(page));
        container.appendChild(button);
      };
      addButton('上一页', currentPage - 1, currentPage <= 1);
      const start = Math.max(1, currentPage - 2);
      const end = Math.min(pagination.total, currentPage + 2);
      for (let page = start; page <= end; page += 1) addButton(String(page), page, false, page === currentPage);
      addButton('下一页', currentPage + 1, currentPage >= pagination.total);
    }

    function readFilters() {
      return {
        search: document.getElementById('search-input').value.trim(),
        college: document.getElementById('college-filter').value,
        grade: document.getElementById('grade-filter').value,
      };
    }

    async function handleResponse(response) {
      if (response.status === 401) {
        localStorage.removeItem('recruitment_officer_token');
        sessionStorage.removeItem('recruitment_officer_token');
        window.location.href = '/html/admin-login.html';
        throw new Error('登录已失效');
      }
      if (!response.ok) {
        const result = await response.json().catch(() => ({}));
        throw new Error(result.message || '请求失败');
      }
      return response;
    }

    function updateFilterOptions(id, label, values) {
      const select = document.getElementById(id);
      const selected = select.value;
      select.replaceChildren(new Option(label, ''));
      values.filter(Boolean).sort().forEach((value) => select.add(new Option(value, value)));
      select.value = selected;
    }

    async function loadSupportData() {
      try {
        const response = await handleResponse(await fetch('/api/membership-applications/stats', { headers: getAuthHeaders() }));
        const stats = await response.json();
        document.getElementById('stat-total').textContent = stats.total;
        document.getElementById('stat-today').textContent = stats.todayCount;
        document.getElementById('stat-colleges').textContent = stats.collegeCount;
        document.getElementById('stat-grades').textContent = stats.gradeCount;
        updateFilterOptions('college-filter', '所有学院', (stats.collegeStats || []).map((row) => row._id));
        updateFilterOptions('grade-filter', '所有年级', (stats.gradeStats || []).map((row) => row._id));
      } catch (error) {
        ['stat-total', 'stat-today', 'stat-colleges', 'stat-grades'].forEach((id) => {
          document.getElementById(id).textContent = '-';
        });
        document.getElementById('college-filter').title = '筛选项暂时无法更新';
        document.getElementById('grade-filter').title = '筛选项暂时无法更新';
      }
    }

    async function loadData(page = 1) {
      if (!getToken()) {
        window.location.href = '/html/admin-login.html';
        return;
      }
      const requestId = ++latestLoadRequest;
      currentPage = page;
      setFeedback('正在加载入会申请…');
      const params = new URLSearchParams({ ...readFilters(), page: String(page), limit: String(pageSize) });
      try {
        const response = await handleResponse(await fetch(`/api/membership-applications?${params}`, { headers: getAuthHeaders() }));
        const data = await response.json();
        if (requestId !== latestLoadRequest) return false;
        currentItems = data.membership_applications || [];
        pagination = data.pagination || { current: 1, total: 0, count: 0 };
        currentPage = pagination.current || page;
        if (pagination.total > 0 && currentPage > pagination.total) {
          return loadData(pagination.total);
        }
        renderTable();
        setFeedback(currentItems.length ? '' : '当前没有符合条件的入会申请。');
        return true;
      } catch (error) {
        if (requestId !== latestLoadRequest) return false;
        currentItems = [];
        pagination = { current: 1, total: 0, count: 0 };
        renderTable();
        setFeedback(error.message || '加载失败，请稍后重试。', true);
        return false;
      }
    }

    function viewDetail(item) {
      const labels = { name: '姓名', studentId: '学号', college: '学院', grade: '年级', phone: '联系电话', email: '电子邮箱', self_introduction: '自我介绍', expectation: '加入期望', createdAt: '提交时间' };
      const content = document.getElementById('detail-content');
      content.replaceChildren();
      Object.entries(labels).forEach(([key, label]) => {
        const labelElement = document.createElement('div');
        labelElement.className = 'detail-label';
        labelElement.textContent = label;
        const valueElement = document.createElement('div');
        valueElement.className = 'detail-value';
        valueElement.textContent = item[key] || '-';
        content.append(labelElement, valueElement);
      });
      document.getElementById('detail-modal').classList.add('open');
    }

    function closeDetail() {
      document.getElementById('detail-modal').classList.remove('open');
    }

    async function deleteItem(item) {
      if (!confirm(`确定删除 ${item.name} 的入会申请？此操作不能撤销。`)) return;
      setFeedback('正在删除…');
      try {
        const response = await handleResponse(await fetch(`/api/membership-applications/${item.id}`, { method: 'DELETE', headers: getAuthHeaders() }));
        const result = await response.json();
        await loadData(currentPage);
        await loadSupportData();
        setFeedback(result.message || '已删除。');
      } catch (error) {
        setFeedback(error.message || '删除失败，请稍后重试。', true);
      }
    }

    function csvCell(value) {
      let text = value === null || value === undefined ? '' : String(value);
      // 防止 Excel 将前导字符解释为公式
      if (/^[=+\-@]/.test(text)) text = `'${text}`;
      return `"${text.replace(/"/g, '""')}"`;
    }

    async function exportCsv() {
      setFeedback('正在生成 CSV…');
      try {
        const params = new URLSearchParams({ ...readFilters(), page: '1', limit: '1000' });
        const response = await handleResponse(await fetch(`/api/membership-applications?${params}`, { headers: getAuthHeaders() }));
        const data = await response.json();
        const items = data.membership_applications || [];
        const headers = ['姓名', '学号', '学院', '年级', '联系电话', '电子邮箱', '自我介绍', '加入期望', '提交时间'];
        const rows = items.map((item) => [
          item.name, item.studentId, item.college, item.grade,
          item.phone, item.email, item.self_introduction, item.expectation, item.createdAt,
        ]);
        const csv = [headers, ...rows].map((row) => row.map(csvCell).join(',')).join('\r\n');
        const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        const now = new Date();
        const localDate = [now.getFullYear(), now.getMonth() + 1, now.getDate()]
          .map((value, index) => index === 0 ? String(value) : String(value).padStart(2, '0'))
          .join('-');
        link.download = `入会申请-${localDate}.csv`;
        link.click();
        URL.revokeObjectURL(link.href);
        setFeedback(`CSV 已生成，共 ${items.length} 条。`);
      } catch (error) {
        setFeedback(error.message || '导出失败，请稍后重试。', true);
      }
    }

    document.addEventListener('DOMContentLoaded', async () => {
      if (!getToken()) {
        window.location.href = '/html/admin-login.html';
        return;
      }
      document.getElementById('refresh-button').addEventListener('click', () => Promise.all([loadData(1), loadSupportData()]));
      document.getElementById('export-button').addEventListener('click', exportCsv);
      document.getElementById('detail-close-button').addEventListener('click', closeDetail);
      document.getElementById('detail-modal').addEventListener('click', (event) => {
        if (event.target === event.currentTarget) closeDetail();
      });
      document.getElementById('logout-button').addEventListener('click', () => {
        localStorage.removeItem('recruitment_officer_token');
        sessionStorage.removeItem('recruitment_officer_token');
        window.location.href = '/html/admin-login.html';
      });
      document.getElementById('search-input').addEventListener('input', () => {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => loadData(1), 250);
      });
      ['college-filter', 'grade-filter'].forEach((id) => document.getElementById(id).addEventListener('change', () => loadData(1)));
      document.addEventListener('keydown', (event) => { if (event.key === 'Escape') closeDetail(); });
      await Promise.all([loadData(), loadSupportData()]);
    });
  </script>
</body>
</html>
