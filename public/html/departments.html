<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>部门介绍 - 无线电爱好者协会</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="/html/styles.css">
  <style>
.info-panel--accent {
  border-left: 3px solid #60a5fa;
}

.metric-strip {
  padding: 0.9rem;
  border: 1px solid rgba(37, 99, 235, 0.08);
  border-radius: var(--radius);
  background: linear-gradient(135deg, rgba(239, 246, 255, 0.8), rgba(248, 250, 252, 0.92));
}

.grid-cols-3 {
  grid-template-columns: repeat(3, 1fr);
}

.site-page .info-panel--accent {
  border-left-color: rgba(37, 99, 235, 0.48);
}

.site-page .metric-strip {
  border: 1px solid rgba(96, 165, 250, 0.16);
  border-radius: 12px;
  background: linear-gradient(135deg, rgba(239, 246, 255, 0.82), rgba(248, 250, 252, 0.72));
}

.site-page.departments-page {
  --page-accent: #0f72c9;
  --page-accent-soft: rgba(14, 116, 201, 0.09);
}

/* 部门页：部门头部、指标与内容分层 */
.site-page.departments-page .content-stack {
  gap: 2rem;
}

.site-page.departments-page .department-card {
  position: relative;
  overflow: hidden;
  border-top: 3px solid var(--page-accent);
  background:
    radial-gradient(circle at 96% 0%, var(--page-accent-soft), transparent 18rem),
    linear-gradient(145deg, #ffffff, #fafcff);
}

.site-page.departments-page .department-card:nth-child(even) {
  --page-accent: #5b5bd6;
  --page-accent-soft: rgba(91, 91, 214, 0.08);
}

.site-page.departments-page .department-card__heading {
  margin-bottom: 1.3rem;
}

.site-page.departments-page .department-card__index {
  display: block;
  margin-bottom: 0.45rem;
  color: var(--page-accent);
  font-size: 0.68rem;
  font-weight: 750;
  letter-spacing: 0.15em;
}

.site-page.departments-page .department-card__heading .card-title {
  margin: 0;
  font-size: clamp(1.5rem, 3vw, 2rem);
}

.site-page.departments-page .department-metrics {
  margin-bottom: 1.25rem;
  padding: 1rem 0;
}

.site-page.departments-page .department-metrics > div {
  display: flex;
  min-width: 0;
  flex-direction: column;
  align-items: center;
  gap: 0.25rem;
}

.site-page.departments-page .department-metrics > div + div {
  border-left: 1px solid rgba(148, 163, 184, 0.17);
}

.site-page.departments-page .department-metrics strong {
  color: var(--page-accent);
  font-size: clamp(1.35rem, 3vw, 1.8rem);
}

.site-page.departments-page .department-metrics span {
  color: var(--site-muted);
  font-size: 0.72rem;
}

.site-page.departments-page .department-tags {
  margin-bottom: 1.25rem;
}

.site-page.departments-page .department-summary {
  display: grid;
  grid-template-columns: minmax(7rem, 0.28fr) minmax(0, 0.72fr);
  gap: 0.3rem 1.25rem;
  margin-bottom: 1.25rem;
  padding: 1.2rem;
  border-left: 3px solid var(--page-accent);
  box-shadow: none;
}

.site-page.departments-page .department-summary > span {
  grid-row: 1 / span 2;
  color: var(--page-accent);
  font-size: 0.66rem;
  font-weight: 750;
  letter-spacing: 0.12em;
}

.site-page.departments-page .department-summary h3 {
  color: var(--site-ink);
  font-size: 0.9rem;
}

.site-page.departments-page .department-summary p {
  color: var(--site-muted);
  font-size: 0.86rem;
  line-height: 1.75;
}

.site-page.departments-page .department-detail {
  position: relative;
  padding: 1.15rem;
  overflow: hidden;
  border-top: 2px solid var(--page-accent);
  box-shadow: none;
}

.site-page.departments-page .department-detail__index {
  position: absolute;
  top: 0.85rem;
  right: 0.9rem;
  color: rgba(100, 116, 139, 0.22);
  font-size: 1.35rem;
  font-weight: 750;
}

.site-page.departments-page .department-detail h3 {
  margin-bottom: 0.9rem;
  color: var(--page-accent);
  font-size: 0.85rem;
}

.site-page.departments-page .department-detail li {
  display: flex;
  align-items: flex-start;
  gap: 0.55rem;
  color: var(--site-muted);
  font-size: 0.82rem;
  line-height: 1.65;
}

.site-page.departments-page .department-detail li > span {
  width: 0.3rem;
  height: 0.3rem;
  flex: 0 0 auto;
  margin-top: 0.5rem;
  border-radius: 50%;
  background: var(--page-accent);
}
  </style>
</head>
<body class="site-page sub-page about-page departments-page">
  <div id="nav-placeholder"></div>

  <header class="subpage-hero">
    <div class="container subpage-hero__inner">
      <span class="subpage-hero__eyebrow">TEAMS &amp; PRACTICE</span>
      <h1>部门介绍</h1>
      <p>了解协会各部门的职责方向、实践内容与成员成长路径。</p>
    </div>
  </header>

  <main class="page-container subpage-content departments-content">
    <div id="departments-list" class="content-stack">
      <!-- 部门内容由 JavaScript 动态生成 -->
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <button class="scrollTopBtn" title="回到顶部">↑</button>

  <div class="image-viewer">
    <img src="" alt="查看图片">
  </div>

  <script src="/html/data.js"></script>
  <script src="/html/common.js"></script>
  <script>
    // 渲染部门列表
    function renderDepartments() {
      const container = document.getElementById('departments-list');
      if (!container) return;
      
      container.innerHTML = departments.map((dept, index) => {
        // 获取统计数据
        const stat1Value = dept.stats.activities || dept.stats.projects || dept.stats.models || dept.stats.softwares || dept.stats.events;
        const stat2Value = dept.stats.years || dept.stats.awards || dept.stats.printers || dept.stats.websites || dept.stats.honors;
        
        return `
          <article class="card card-section department-card">
            <div class="department-card__heading">
              <span class="department-card__index">DEPARTMENT / ${String(index + 1).padStart(2, '0')}</span>
              <h2 class="card-title">${dept.name}</h2>
            </div>

            <div class="metric-strip grid grid-cols-3 gap-4 department-metrics">
              <div>
                <strong>${dept.stats.members}</strong>
                <span>部门成员</span>
              </div>
              <div>
                <strong>${stat1Value}</strong>
                <span>${dept.statLabel1}</span>
              </div>
              <div>
                <strong>${stat2Value}</strong>
                <span>${dept.statLabel2}</span>
              </div>
            </div>
            
            <div class="flex flex-wrap gap-2 department-tags">
              ${dept.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
            </div>
            
            <div class="info-panel info-panel--accent department-summary">
              <span>ABOUT THE TEAM</span>
              <h3>部门简介</h3>
              <p>${dept.description}</p>
            </div>
            
            <div class="grid md:grid-cols-3 gap-4 department-detail-grid">
              <div class="info-panel department-detail">
                <span class="department-detail__index">01</span>
                <h3>主要职责</h3>
                <ul class="space-y-2">
                  ${dept.responsibilities.map(item => `
                    <li>
                      <span aria-hidden="true"></span>${item}
                    </li>
                  `).join('')}
                </ul>
              </div>
              <div class="info-panel department-detail">
                <span class="department-detail__index">02</span>
                <h3>部门特色</h3>
                <ul class="space-y-2">
                  ${dept.features.map(item => `
                    <li>
                      <span aria-hidden="true"></span>${item}
                    </li>
                  `).join('')}
                </ul>
              </div>
              <div class="info-panel department-detail">
                <span class="department-detail__index">03</span>
                <h3>学习内容</h3>
                <ul class="space-y-2">
                  ${dept.learn.map(item => `
                    <li>
                      <span aria-hidden="true"></span>${item}
                    </li>
                  `).join('')}
                </ul>
              </div>
            </div>
          </article>
        `;
      }).join('');
    }

    // 页面加载后渲染
    document.addEventListener('DOMContentLoaded', renderDepartments);
  </script>
</body>
</html>
