<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>无线电爱好者协会 | 燕山大学</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="/html/styles.css">
  <style>
.home-page {
  --home-electric-blue: #2563eb;
  --home-cyan: #0891b2;
  --home-panel-light: #dceafb;
  background: #f5f8fc;
  height: 100dvh;
  overflow: hidden;
}

.home-page .nav {
  position: fixed;
  inset: 0 0 auto 0;
}

.home-page .hero {
  position: relative;
  height: 100dvh;
  min-height: 100dvh;
  overflow: hidden;
  isolation: isolate;
  background: linear-gradient(125deg, #eef7ff 0%, #e4f1fc 48%, #d8eaf8 100%);
}

.home-page .hero-bg {
  position: absolute;
  inset: 0;
  z-index: -1;
}

.home-page .home-hero-canvas {
  position: absolute;
  inset: 0;
  z-index: 2;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

.home-page .home-hero-mesh {
  position: absolute;
  inset: 0;
  z-index: 1;
  opacity: 0.42;
  background-image:
    linear-gradient(rgba(30, 78, 121, 0.13) 1px, transparent 1px),
    linear-gradient(90deg, rgba(30, 78, 121, 0.13) 1px, transparent 1px);
  background-position: center;
  background-size: 52px 52px;
  -webkit-mask-image: linear-gradient(90deg, transparent 4%, rgba(0, 0, 0, 0.22) 34%, #000 58%, #000);
  mask-image: linear-gradient(90deg, transparent 4%, rgba(0, 0, 0, 0.22) 34%, #000 58%, #000);
  pointer-events: none;
}

.home-page .hero-content {
  position: relative;
  z-index: 6;
  display: flex;
  height: 100%;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding-top: 0;
  padding-bottom: 0;
  text-align: center;
}

.home-page .home-hero-copy {
  position: relative;
  width: min(100%, 900px);
  max-width: 900px;
  text-align: center;
}

.home-page .hero-eyebrow {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0;
  margin-bottom: 1rem;
  color: #315d88;
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.2em;
}

.home-page .hero-eyebrow::before,
.home-page .hero-eyebrow::after {
  content: "";
  width: 2.6rem;
  height: 1px;
  margin: 0 0.8rem;
  background: linear-gradient(90deg, var(--home-electric-blue), var(--home-cyan));
}

.home-page .hero-content h1 {
  max-width: 900px;
  margin-bottom: 1.25rem;
  color: #10233f;
  font-size: clamp(3rem, 5.9vw, 5.35rem);
  font-weight: 720;
  line-height: 1.05;
  letter-spacing: -0.025em;
  text-wrap: balance;
}

.home-page .hero-content p {
  max-width: 42rem;
  margin: 0 auto 2rem;
  color: #52657d;
  font-size: clamp(1.05rem, 1.5vw, 1.24rem);
  letter-spacing: 0.03em;
}

.home-page .hero-buttons {
  display: flex;
  justify-content: center;
  gap: 0.85rem;
}

.home-page .btn-primary {
  display: inline-flex;
  min-height: 2.75rem;
  align-items: center;
  justify-content: center;
  gap: 0.4rem;
  padding: 0.6rem 1.5rem;
  border: 1px solid rgba(255,255,255,0.5);
  border-radius: 0.65rem;
  color: #fff;
  font-size: 0.95rem;
  font-weight: 500;
  text-decoration: none;
  transition:
    transform 220ms ease,
    border-color 220ms ease,
    box-shadow 220ms ease,
    background-color 220ms ease,
    color 220ms ease;
}

.home-page .hero-btn-primary,
.home-page .hero-btn-secondary {
  position: relative;
  min-width: 8rem;
  overflow: hidden;
}

.home-page .hero .hero-btn-primary {
  color: #ffffff;
  border-color: #2563eb;
  background: #2563eb;
  box-shadow: 0 10px 26px rgba(37, 99, 235, 0.2);
}

.home-page .hero .hero-btn-secondary {
  color: #1e4f91;
  border-color: rgba(30, 79, 145, 0.32);
  background: rgba(255, 255, 255, 0.66);
  -webkit-backdrop-filter: blur(6px);
  backdrop-filter: blur(6px);
}

.home-page .footer,
.home-page .scrollTopBtn {
  display: none;
}

.site-intro {
  position: fixed;
  inset: 0;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0.75rem;
  background: linear-gradient(145deg, #071a36, #041225);
  color: #ffffff;
  transition: opacity 800ms ease, transform 800ms ease, visibility 800ms;
}

.site-intro.is-exiting {
  opacity: 0;
  transform: translateY(-18px);
  visibility: hidden;
  pointer-events: none;
}

.site-intro__brand {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  animation: intro-brand-in 600ms ease both;
}

.site-intro__brand img {
  width: 3rem;
  height: 3rem;
  padding: 4px;
  border-radius: 6px;
  background: #2563eb;
}

.site-intro__brand span {
  font-size: 1.5rem;
  font-weight: 700;
  letter-spacing: 0.02em;
}

.site-intro__tagline {
  color: rgba(255, 255, 255, 0.7);
  font-size: 0.8rem;
  letter-spacing: 0.14em;
  animation: intro-brand-in 600ms 120ms ease both;
}

@keyframes intro-brand-in {
  from { opacity: 0; transform: translateY(14px); }
  to { opacity: 1; transform: translateY(0); }
}

@media (hover: hover) {
  .home-page .hero .hero-btn-primary:hover {
    transform: translateY(-2px);
    border-color: #1d4ed8;
    background: #1d4ed8;
    box-shadow: 0 14px 30px rgba(37, 99, 235, 0.26);
  }

  .home-page .hero .hero-btn-secondary:hover {
    transform: translateY(-2px);
    color: #173f73;
    border-color: rgba(30, 79, 145, 0.5);
    background: rgba(255, 255, 255, 0.88);
    box-shadow: 0 12px 26px rgba(41, 76, 112, 0.13);
  }
}

@media (max-width: 800px) {
  .home-page .home-hero-mesh {
    opacity: 0.3;
    background-size: 44px 44px;
    -webkit-mask-image: none;
    mask-image: none;
  }

  .home-page .hero-content h1 {
    max-width: 37rem;
    font-size: clamp(2.55rem, 8vw, 3.45rem);
  }
}

@media (max-width: 540px) {
  .home-page .hero-content {
    padding-right: 1rem;
    padding-left: 1rem;
  }

  .home-page .hero-eyebrow {
    font-size: 0.62rem;
    letter-spacing: 0.14em;
  }

  .home-page .hero-eyebrow::before,
  .home-page .hero-eyebrow::after {
    width: 1.5rem;
    margin: 0 0.55rem;
  }

  .home-page .hero-content h1 {
    font-size: clamp(2.25rem, 10.5vw, 2.75rem);
    line-height: 1.08;
  }

  .home-page .hero-content p {
    max-width: 21rem;
    margin-bottom: 1.6rem;
    font-size: 0.98rem;
    line-height: 1.65;
  }

  .home-page .hero-buttons {
    gap: 0.65rem;
  }

  .home-page .hero-btn-primary,
  .home-page .hero-btn-secondary {
    min-width: 7rem;
    min-height: 2.75rem;
    padding-right: 1.1rem;
    padding-left: 1.1rem;
  }
}

@media (prefers-reduced-motion: reduce) {
  .site-intro {
    transition: none;
  }

  .site-intro__brand,
  .site-intro__tagline {
    animation: none;
    opacity: 1;
  }

  .site-intro.is-exiting {
    opacity: 0;
  }
}
  </style>
</head>
<body class="home-page">
  <div class="site-intro" id="site-intro" aria-hidden="true" style="display: none;">
    <div class="site-intro__brand">
      <img src="/images/emblem.png" alt="">
      <span>无线电爱好者协会</span>
    </div>
    <div class="site-intro__tagline">燕山大学 · 技术实践类社团</div>
  </div>

  <div id="nav-placeholder"></div>

  <!-- Hero 区域 -->
  <header class="hero">
    <div class="hero-bg" aria-hidden="true">
      <canvas id="home-hero-canvas" class="home-hero-canvas"></canvas>
      <div class="home-hero-mesh"></div>
    </div>
    <div class="hero-content container">
      <div class="hero-copy home-hero-copy">
        <div class="hero-eyebrow">YSU RADIO ASSOCIATION</div>
        <h1>燕山大学无线电爱好者协会</h1>
        <p>连接无线电技术、电子实践与工程创新</p>
        <div class="hero-buttons">
          <a href="/html/about-association.html" class="btn-primary hero-btn-primary">了解协会</a>
          <a href="/html/registration.html" class="btn-primary hero-btn-secondary">加入我们</a>
        </div>
      </div>
    </div>
  </header>

  <div id="footer-placeholder"></div>

  <button class="scrollTopBtn" title="回到顶部">↑</button>

  <div class="image-viewer">
    <img src="" alt="查看图片">
  </div>

  <script src="/html/common.js"></script>
  <script>
    (function () {
      const intro = document.getElementById('site-intro');
      if (!intro) return;

      try {
        if (sessionStorage.getItem('radio-intro-shown')) {
          intro.remove();
          return;
        }

        intro.style.display = '';

        const exit = () => {
          intro.classList.add('is-exiting');
          sessionStorage.setItem('radio-intro-shown', '1');
        };

        if (document.readyState === 'complete') {
          window.setTimeout(exit, 1400);
        } else {
          window.addEventListener('load', () => window.setTimeout(exit, 900), { once: true });
        }

        intro.addEventListener('transitionend', () => intro.remove(), { once: true });
      } catch (error) {
        intro.remove();
      }
    })();
  </script>
  <script src="/html/home-effects.js"></script>
</body>
</html>
