<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文娱活动 - 无线电爱好者协会</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="/html/styles.css">
  <style>
.site-page.recreational-page .activity-record {
  --page-accent: #6d4de0;
  --page-accent-soft: rgba(109, 77, 224, 0.1);
}

.site-page.activity-page .activity-record__details--equal {
  grid-template-columns: repeat(2, minmax(0, 1fr));
}
  </style>
</head>
<body class="site-page sub-page activity-page recreational-page">
  <div id="nav-placeholder"></div>

  <header class="subpage-hero">
    <div class="container subpage-hero__inner">
      <h1>文娱活动</h1>
      <p>记录社团文化、团队建设与成员共同参与的校园活动。</p>
    </div>
  </header>

  <main class="page-container subpage-content">
    <a href="/html/activities.html" class="back-link">← 返回活动</a>

    <div id="recreational-list" class="content-stack">
      <!-- 文娱活动内容由 JavaScript 动态生成 -->
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <button class="scrollTopBtn" title="回到顶部">↑</button>

  <div class="image-viewer">
    <img src="" alt="查看图片">
  </div>

  <script src="/html/data.js"></script>
  <script src="/html/common.js"></script>
  <script>
    // 渲染文娱活动列表
    function renderRecreationalActivities() {
      const container = document.getElementById('recreational-list');
      if (!container) return;
      
      container.innerHTML = recreationalActivities.map((activity, index) => `
        <article class="card card-section activity-record activity-record--community">
          <div class="activity-record__rail">
            <span class="activity-record__index">${String(index + 1).padStart(2, '0')}</span>
            <span class="activity-record__date">${activity.date}</span>
          </div>

          <div class="activity-record__content">
            <h2 class="card-title">${activity.name}</h2>
            <p class="activity-record__summary">${activity.description}</p>

            <div class="activity-record__details activity-record__details--equal">
              <div class="info-panel activity-record__note">
                <h3>参与人员</h3>
                <p>${activity.participants}</p>
              </div>

              <div class="info-panel activity-record__note">
                <h3>活动成果</h3>
                <p>${activity.achievements}</p>
              </div>
            </div>
          </div>
        </article>
      `).join('');
    }

    // 页面加载后渲染
    document.addEventListener('DOMContentLoaded', renderRecreationalActivities);
  </script>
</body>
</html>
