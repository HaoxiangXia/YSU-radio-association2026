<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文娱活动 - 无线电爱好者协会</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="/html/styles.css">
</head>
<body class="site-page sub-page activity-page recreational-page">
  <div id="nav-placeholder"></div>

  <header class="subpage-hero">
    <div class="container subpage-hero__inner">
      <span class="subpage-hero__eyebrow">CAMPUS &amp; COMMUNITY</span>
      <h1>文娱活动</h1>
      <p>记录社团文化、团队建设与成员共同参与的校园活动。</p>
    </div>
  </header>

  <main class="page-container subpage-content">
    <a href="/html/activities.html" class="back-link">← 返回活动</a>

    <div id="recreational-list" class="content-stack">
      <!-- 文娱活动内容由 JavaScript 动态生成 -->
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <button class="scrollTopBtn" title="回到顶部">↑</button>

  <div class="image-viewer">
    <img src="" alt="查看图片">
  </div>

  <script src="/html/data.js"></script>
  <script src="/html/common.js"></script>
  <script>
    // 渲染文娱活动列表
    function renderRecreationalActivities() {
      const container = document.getElementById('recreational-list');
      if (!container) return;
      
      container.innerHTML = recreationalActivities.map(activity => `
        <div class="card card-section">
          <div class="flex items-start justify-between mb-4">
            <div>
              <h2 class="card-title mb-0">${activity.name}</h2>
              <div class="text-sm text-gray-500 mt-1">${activity.date}</div>
            </div>
          </div>
          
          <p class="text-gray-600 text-sm leading-relaxed mb-4">${activity.description}</p>
          
          <div class="info-panel mb-4">
            <h3 class="font-semibold mb-2 text-sm text-gray-700">参与人员</h3>
            <p class="text-gray-600 text-sm">${activity.participants}</p>
          </div>
          
          <div class="info-panel">
            <h3 class="font-semibold mb-2 text-sm text-gray-700">活动成果</h3>
            <p class="text-gray-600 text-sm">${activity.achievements}</p>
          </div>
        </div>
      `).join('');
    }

    // 页面加载后渲染
    document.addEventListener('DOMContentLoaded', renderRecreationalActivities);
  </script>
</body>
</html>
