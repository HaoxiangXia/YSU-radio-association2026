<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>培训教学 - 无线电爱好者协会</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="/html/styles.css">
  <style>
.cta-card {
  border-color: rgba(37, 99, 235, 0.2);
  background: linear-gradient(135deg, rgba(239, 246, 255, 0.75), rgba(255, 255, 255, 0.95));
}

/* 时间线 */
.timeline {
  position: relative;
  padding-left: 2rem;
}

.timeline::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 2px;
  background: linear-gradient(180deg, #93c5fd, #dbeafe);
}

.timeline-item {
  position: relative;
  padding-bottom: 1.5rem;
}

.timeline-item:last-child {
  padding-bottom: 0;
}

.timeline-item::before {
  content: '';
  position: absolute;
  left: -2rem;
  top: 0.375rem;
  width: 10px;
  height: 10px;
  background: var(--color-primary);
  border: 3px solid #eff6ff;
  border-radius: 50%;
  box-shadow: 0 0 0 1px rgba(37, 99, 235, 0.2);
  transform: translateX(-4px);
}

.timeline-date {
  font-size: 0.75rem;
  color: var(--color-primary);
  font-weight: 600;
  margin-bottom: 0.25rem;
}

.timeline-title {
  font-weight: 600;
  color: #1f2937;
  margin-bottom: 0.25rem;
}

.timeline-desc {
  font-size: 0.875rem;
  color: #6b7280;
}

.site-page .timeline::before {
  background: linear-gradient(180deg, var(--site-blue), var(--site-cyan), rgba(125, 211, 252, 0.18));
}

.site-page .timeline-item::before {
  box-shadow:
    0 0 0 4px #eff6ff,
    0 0 0 5px rgba(37, 99, 235, 0.18);
}

.site-page.training-page {
  --page-accent: #087f8c;
  --page-accent-soft: rgba(8, 127, 140, 0.09);
}

/* 培训页：编号分区、学习路径与档案 */
.site-page.training-page .training-section {
  border-color: rgba(8, 127, 140, 0.16);
}

.site-page.training-page .training-section__heading {
  margin-bottom: 1rem;
}

.site-page.training-page .training-section__heading > span,
.site-page.training-page .training-cta__eyebrow {
  display: block;
  margin-bottom: 0.45rem;
  color: var(--page-accent);
  font-size: 0.67rem;
  font-weight: 750;
  letter-spacing: 0.15em;
}

.site-page.training-page .training-section__heading .card-title {
  margin-bottom: 0;
  font-size: clamp(1.25rem, 2.5vw, 1.7rem);
}

.site-page.training-page .training-overview {
  background:
    radial-gradient(circle at 95% 10%, rgba(45, 212, 191, 0.12), transparent 18rem),
    #ffffff;
}

.site-page.training-page .training-stats .stat-card {
  border-top: 2px solid rgba(8, 127, 140, 0.48);
}

.site-page.training-page .training-stats .stat-value {
  color: var(--page-accent);
}

.site-page.training-page .training-skills .tag {
  border-color: rgba(8, 127, 140, 0.17);
  background: rgba(236, 254, 255, 0.76);
  color: #0f6973;
}

.site-page.training-page .training-roadmap .timeline-item {
  padding: 0.2rem 0 1.55rem 2rem;
}

.site-page.training-page .training-roadmap .timeline-date {
  color: var(--page-accent);
  font-size: 0.72rem;
  font-weight: 750;
  letter-spacing: 0.06em;
}

.site-page.training-page .training-roadmap .timeline-title {
  color: var(--site-ink);
  font-size: 1rem;
}

.site-page.training-page .training-archive-item {
  display: block;
  margin-bottom: 0.85rem;
  padding: 1rem 1.15rem;
  border-left: 2px solid rgba(8, 127, 140, 0.38);
  box-shadow: none;
}

.site-page.training-page .training-archive-item:last-child {
  margin-bottom: 0;
}

.site-page.training-page .training-archive-item__meta {
  display: flex;
  flex-wrap: wrap;
  gap: 0.6rem 1.25rem;
  color: var(--site-muted);
  font-size: 0.76rem;
}

.site-page.training-page .training-archive-item__meta span {
  display: inline-flex;
  gap: 0.42rem;
}

.site-page.training-page .training-archive-item__meta strong {
  color: var(--page-accent);
  font-weight: 700;
}

.site-page.training-page .training-cta {
  overflow: hidden;
  border-color: rgba(125, 211, 252, 0.14);
  background:
    radial-gradient(circle at 86% 14%, rgba(45, 212, 191, 0.19), transparent 18rem),
    linear-gradient(125deg, #071a2c, #0a3550);
}

.site-page.training-page .training-cta .training-cta__eyebrow {
  color: #67e8f9;
}

.site-page.training-page .training-cta .card-title {
  color: #f8fafc;
  font-size: clamp(1.5rem, 3vw, 2rem);
}

.site-page.training-page .training-cta p {
  color: rgba(226, 232, 240, 0.76);
}
  </style>
</head>
<body class="site-page sub-page training-page">
  <div id="nav-placeholder"></div>

  <header class="subpage-hero">
    <div class="container subpage-hero__inner">
      <h1>培训教学</h1>
      <p>以工程实践为核心，构建从基础入门到项目协作的学习路径。</p>
    </div>
  </header>

  <main class="page-container subpage-content training-content">
    <!-- 培训体系概述 -->
    <section class="card card-section mb-6 training-section training-overview">
      <div class="training-section__heading">
        <span>01 / LEARNING SYSTEM</span>
        <h2 class="card-title">培训体系</h2>
      </div>
      <p class="text-gray-600 leading-relaxed mb-4">
        协会建立了完善的培训体系，从基础入门到高级进阶，涵盖嵌入式开发、编程、机械设计等多个方向。通过系统的课程安排和实践项目，帮助成员快速成长。
      </p>
      
      <!-- 培训统计 -->
      <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-6 training-stats" id="training-stats">
        <!-- 统计内容由 JavaScript 动态生成 -->
      </div>
      
      <!-- 技能标签 -->
      <div class="flex flex-wrap gap-2 training-skills" id="skill-tags">
        <!-- 技能标签由 JavaScript 动态生成 -->
      </div>
    </section>

    <!-- 培训时间线 -->
    <section class="card card-section mb-6 training-section training-roadmap">
      <div class="training-section__heading">
        <span>02 / ROADMAP</span>
        <h2 class="card-title">培训时间线</h2>
      </div>
      <div class="timeline" id="training-timeline">
        <!-- 时间线内容由 JavaScript 动态生成 -->
      </div>
    </section>

    <!-- 课程安排 -->
    <section class="card card-section mb-6 training-section training-schedule">
      <div class="training-section__heading">
        <span>03 / WEEKLY SCHEDULE</span>
        <h2 class="card-title">每周课程安排</h2>
      </div>
      <div class="overflow-x-auto">
        <table class="data-table">
          <thead>
            <tr>
              <th style="width: 5rem;">周次</th>
              <th>课程内容</th>
            </tr>
          </thead>
          <tbody id="course-schedule">
            <!-- 课程内容由 JavaScript 动态生成 -->
          </tbody>
        </table>
      </div>
    </section>

    <!-- 往期培训 -->
    <section class="card card-section mb-6 training-section training-archive">
      <div class="training-section__heading">
        <span>04 / ARCHIVE</span>
        <h2 class="card-title">往期培训</h2>
      </div>
      <div id="past-trainings">
        <!-- 往期培训内容由 JavaScript 动态生成 -->
      </div>
    </section>

    <!-- 报名号召 -->
    <section class="card card-section cta-card text-center p-8 training-cta">
      <span class="training-cta__eyebrow">START YOUR PRACTICE</span>
      <h2 class="card-title">加入我们</h2>
      <p class="text-gray-600 mb-6">对技术充满热情？想要学习新技能？加入无线电爱好者协会，开启你的技术之旅！</p>
      <a href="/html/registration.html" class="btn-solid">立即报名</a>
    </section>
  </main>

  <div id="footer-placeholder"></div>

  <button class="scrollTopBtn" title="回到顶部">↑</button>

  <div class="image-viewer">
    <img src="" alt="查看图片">
  </div>

  <script src="/html/data.js"></script>
  <script src="/html/common.js"></script>
  <script>
    // 渲染培训统计
    function renderTrainingStats() {
      const container = document.getElementById('training-stats');
      if (!container) return;
      
      container.innerHTML = trainingStats.map(stat => `
        <div class="stat-card">
          <div class="stat-value">${stat.value}</div>
          <div class="stat-label">${stat.label}</div>
        </div>
      `).join('');
    }

    // 渲染技能标签
    function renderSkillTags() {
      const container = document.getElementById('skill-tags');
      if (!container) return;
      
      container.innerHTML = skillTags.map(tag => `
        <span class="tag">${tag}</span>
      `).join('');
    }

    // 渲染培训时间线
    function renderTrainingTimeline() {
      const container = document.getElementById('training-timeline');
      if (!container) return;
      
      container.innerHTML = trainingTimeline.map(item => `
        <div class="timeline-item">
          <div class="timeline-date">${item.date}</div>
          <div class="timeline-title">${item.title}</div>
          <div class="timeline-desc">${item.desc}</div>
        </div>
      `).join('');
    }

    // 渲染课程安排
    function renderCourseSchedule() {
      const tbody = document.getElementById('course-schedule');
      if (!tbody) return;
      
      tbody.innerHTML = courseSchedule.map(item => `
        <tr>
          <td class="font-medium text-gray-800">${item.week}</td>
          <td class="text-gray-600">${item.content}</td>
        </tr>
      `).join('');
    }

    // 渲染往期培训
    function renderPastTrainings() {
      const container = document.getElementById('past-trainings');
      if (!container) return;
      
      container.innerHTML = pastTrainings.map(training => `
        <article class="info-panel training-archive-item">
          <div class="flex items-start justify-between mb-2">
            <h3 class="font-bold text-gray-800">${training.title}</h3>
            <span class="text-sm text-gray-500">${training.date}</span>
          </div>
          <p class="text-gray-600 text-sm mb-2">${training.description}</p>
          <div class="training-archive-item__meta">
            <span><strong>地点</strong>${training.location}</span>
            <span><strong>讲师</strong>${training.instructor}</span>
            <span><strong>对象</strong>${training.target}</span>
          </div>
        </article>
      `).join('');
    }

    // 页面加载后渲染
    document.addEventListener('DOMContentLoaded', () => {
      renderTrainingStats();
      renderSkillTags();
      renderTrainingTimeline();
      renderCourseSchedule();
      renderPastTrainings();
    });
  </script>
</body>
</html>
