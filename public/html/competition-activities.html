<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>竞赛活动 - 无线电爱好者协会</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="/html/styles.css">
  <style>
.site-page.activity-page .activity-record__tags {
  margin-bottom: 1.4rem;
}

.site-page.activity-page .activity-record__metric {
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.site-page.activity-page .activity-record__metric strong {
  color: var(--page-accent);
  font-size: 1.35rem;
}

.site-page.activity-page .activity-record__highlights li {
  display: flex;
  align-items: flex-start;
  gap: 0.6rem;
}

.site-page.activity-page .activity-record__highlights li > span {
  width: 0.35rem;
  height: 0.35rem;
  flex: 0 0 auto;
  margin-top: 0.55rem;
  border-radius: 50%;
  background: var(--page-accent);
}
  </style>
</head>
<body class="site-page sub-page activity-page competition-page">
  <div id="nav-placeholder"></div>

  <header class="subpage-hero">
    <div class="container subpage-hero__inner">
      <h1>竞赛活动</h1>
      <p>记录协会参与的工程竞赛、创新项目与团队实践成果。</p>
    </div>
  </header>

  <main class="page-container subpage-content">
    <a href="/html/activities.html" class="back-link">← 返回活动</a>

    <div id="competitions-list" class="content-stack">
      <!-- 竞赛内容由 JavaScript 动态生成 -->
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <button class="scrollTopBtn" title="回到顶部">↑</button>

  <div class="image-viewer">
    <img src="" alt="查看图片">
  </div>

  <script src="/html/data.js"></script>
  <script src="/html/common.js"></script>
  <script>
    // 渲染竞赛列表
    function renderCompetitions() {
      const container = document.getElementById('competitions-list');
      if (!container) return;
      
      container.innerHTML = competitions.map((comp, index) => `
        <article class="card card-section activity-record activity-record--competition">
          <div class="activity-record__rail">
            <span class="activity-record__index">${String(index + 1).padStart(2, '0')}</span>
            <span class="activity-record__date">${comp.date}</span>
          </div>

          <div class="activity-record__content">
            <h2 class="card-title">${comp.name}</h2>
            <p class="activity-record__summary">${comp.description}</p>

            <div class="flex flex-wrap gap-2 activity-record__tags">
              ${comp.tracks.map(track => `<span class="tag">${track}</span>`).join('')}
            </div>

            <div class="activity-record__details">
              ${comp.participants ? `
                <div class="info-panel activity-record__metric">
                  <span>参赛人数</span>
                  <strong>${comp.participants} 人</strong>
                </div>
              ` : ''}

              <div class="info-panel activity-record__highlights">
                <h3>活动亮点</h3>
                <ul class="space-y-2">
                  ${comp.highlights.map(item => `
                    <li><span aria-hidden="true"></span>${item}</li>
                  `).join('')}
                </ul>
              </div>
            </div>

            ${comp.images?.length ? `
              <section class="activity-gallery" aria-label="${comp.name}活动图片">
                ${comp.images.map((image, imageIndex) => `
                  <button type="button" class="activity-gallery__item" data-image="${image}" data-image-alt="${comp.name}活动现场照片 ${imageIndex + 1}" aria-label="查看${comp.name}活动照片 ${imageIndex + 1}">
                    <img src="${image}" alt="${comp.name}活动现场照片 ${imageIndex + 1}" loading="lazy" decoding="async">
                  </button>
                `).join('')}
              </section>
            ` : ''}
          </div>
        </article>
      `).join('');
    }

    // 页面加载后渲染
    document.addEventListener('DOMContentLoaded', renderCompetitions);
  </script>
</body>
</html>
