<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理员登录 - 无线电爱好者协会</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="/html/styles.css">
  <style>
.page-container--compact {
  max-width: 28rem;
}
  </style>
</head>
<body class="site-page sub-page admin-page admin-login-page">
  <div id="nav-placeholder"></div>

  <header class="subpage-hero subpage-hero--compact">
    <div class="container subpage-hero__inner">
      <h1>管理员登录</h1>
      <p>管理员身份验证与报名信息管理入口。</p>
    </div>
  </header>

  <main class="page-container page-container--compact subpage-content">
    <div class="card form-card">
      <form id="login-form" class="space-y-4">
        <div>
          <label for="admin-username" class="form-label">用户名</label>
          <input type="text" id="admin-username" name="username" class="form-input" placeholder="请输入用户名" required>
        </div>

        <div>
          <label for="admin-password" class="form-label">密码</label>
          <input type="password" id="admin-password" name="password" class="form-input" placeholder="请输入密码" required>
        </div>

        <div class="flex items-center gap-2">
          <input type="checkbox" id="remember" name="remember" class="rounded">
          <label for="remember" class="text-sm text-gray-600">记住我</label>
        </div>

        <div id="error-message" class="text-red-500 text-sm" style="display: none;"></div>

        <button type="submit" class="btn-solid w-full" id="login-btn">登录</button>
      </form>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <button class="scrollTopBtn" title="回到顶部">↑</button>

  <div class="image-viewer">
    <img src="" alt="查看图片">
  </div>

  <script src="/html/data.js"></script>
  <script src="/html/common.js"></script>
  <script>
    // 检查是否已登录
    function checkAuth() {
      const token = localStorage.getItem('admin_token') || sessionStorage.getItem('admin_token');
      if (token) {
        // 验证 token
        fetch('/api/admin/verify', {
          headers: { 'Authorization': `Bearer ${token}` }
        })
        .then(response => {
          if (response.ok) {
            window.location.href = '/html/registration-info.html';
          }
        })
        .catch(() => {
          // token 无效，继续显示登录页面
        });
      }
    }

    // 处理登录
    async function handleLogin(e) {
      e.preventDefault();
      
      const form = document.getElementById('login-form');
      const errorDiv = document.getElementById('error-message');
      const loginBtn = document.getElementById('login-btn');
      
      // 清除错误
      errorDiv.style.display = 'none';
      
      // 禁用登录按钮
      loginBtn.disabled = true;
      loginBtn.textContent = '登录中...';
      
      try {
        const username = form.elements.username.value.trim();
        const password = form.elements.password.value.trim();
        const remember = form.elements.remember.checked;
        
        const response = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        
        const data = await response.json();
        
        if (response.ok && data.token) {
          // 存储 token
          if (remember) {
            localStorage.setItem('admin_token', data.token);
          } else {
            sessionStorage.setItem('admin_token', data.token);
          }
          
          // 跳转到管理页面
          window.location.href = '/html/registration-info.html';
        } else {
          errorDiv.textContent = data.message || '用户名或密码错误';
          errorDiv.style.display = 'block';
        }
      } catch (error) {
        errorDiv.textContent = '登录失败，请稍后再试';
        errorDiv.style.display = 'block';
      } finally {
        // 恢复登录按钮
        loginBtn.disabled = false;
        loginBtn.textContent = '登录';
      }
    }

    // 页面加载后初始化
    document.addEventListener('DOMContentLoaded', () => {
      checkAuth();
      
      const form = document.getElementById('login-form');
      if (form) {
        form.addEventListener('submit', handleLogin);
      }
    });
  </script>
</body>
</html>
